<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>신앙 유형 검사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{
  --bg:#F8F6F1;--surface:#FFFFFF;--text:#1A1814;--text-muted:#7A7568;
  --text-light:#B0A99E;--border:#E8E3DC;--accent:#3D3526;--ph:3px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.progress-bar{position:fixed;top:0;left:0;right:0;height:var(--ph);background:var(--border);z-index:100;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* INTRO */
#screen-intro{justify-content:center;align-items:center;padding:60px 28px;text-align:center;}
.intro-line{width:48px;height:1px;background:var(--accent);margin:0 auto 32px;}
.intro-title{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1.35;margin-bottom:14px;}
.intro-sub{font-size:13px;color:var(--text-muted);line-height:1.9;margin-bottom:40px;}
.intro-meta{display:flex;gap:28px;justify-content:center;margin-bottom:44px;}
.meta-item{text-align:center;}
.meta-num{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;}
.meta-lbl{font-size:11px;color:var(--text-light);margin-top:3px;}
.btn-primary{display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:opacity .2s;}
.btn-primary:active{opacity:.85;}

/* AXIS INTRO */
#screen-axis{justify-content:center;align-items:center;padding:56px 28px;text-align:center;}
.axis-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:12px;font-weight:500;color:#fff;letter-spacing:.3px;}
.axis-intro-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:600;margin-bottom:10px;}
.axis-intro-desc{font-size:13px;color:var(--text-muted);line-height:1.85;margin-bottom:10px;}
.axis-intro-range{font-size:11px;color:var(--text-light);}

/* QUESTION */
#screen-question{padding-top:var(--ph);}
.q-top{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.q-counter{font-size:11px;color:var(--text-light);letter-spacing:.5px;}
.q-axis-tag{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.3px;}
.q-body{flex:1;padding:28px 24px 24px;display:flex;flex-direction:column;}
.q-text{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:400;line-height:1.7;flex:1;margin-bottom:40px;}
.likert{display:flex;gap:8px;margin-bottom:20px;}
.likert-btn{flex:1;aspect-ratio:1;border:1.5px solid var(--border);background:var(--surface);border-radius:4px;font-size:15px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.likert-btn.selected{border-width:2px;color:#fff;}
.likert-btn:active{transform:scale(.95);}
.likert-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);padding:0 2px;margin-bottom:32px;}
.q-nav{display:flex;gap:10px;}
.btn-prev{padding:14px 20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;}
.btn-next{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-next:disabled{opacity:.35;cursor:default;}

/* CALC */
#screen-calc{justify-content:center;align-items:center;padding:48px 28px;text-align:center;}
.calc-ring{width:64px;height:64px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.calc-text{font-size:14px;color:var(--text-muted);}

/* RESULT */
#screen-result{padding:0;}
.result-header{padding:52px 28px 32px;text-align:center;border-bottom:1px solid var(--border);}
.result-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;letter-spacing:.3px;margin-bottom:16px;}
.result-typename{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:600;margin-bottom:6px;}
.result-typesub{font-size:14px;color:var(--text-muted);margin-bottom:4px;}
.result-quote{font-size:13px;color:var(--text-light);font-style:italic;margin-top:16px;line-height:1.7;}
.result-section{padding:28px 24px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--text-light);text-transform:uppercase;margin-bottom:16px;}
.radar-wrap{display:flex;justify-content:center;margin:4px 0 16px;}
.axis-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.axis-bar-label{font-size:13px;font-weight:500;width:32px;flex-shrink:0;}
.axis-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.axis-bar-fill{height:6px;border-radius:3px;transition:width .6s ease;}
.axis-bar-val{font-size:13px;font-weight:500;width:32px;text-align:right;flex-shrink:0;}

/* analysis blocks */
.analysis-block{margin-bottom:14px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.ab-head{padding:12px 16px;font-size:11px;font-weight:500;letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.ab-head-dot{width:6px;height:6px;border-radius:50%;}
.ab-body{padding:14px 16px;background:#fff;}
.ab-body p{font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px;}
.ab-body p:last-child{margin-bottom:0;}
.ab-body .personal-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;margin-bottom:8px;}

/* rank */
.rank-item{padding:12px 0;border-bottom:1px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-top{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.rank-num{font-size:11px;color:var(--text-light);width:16px;}
.rank-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rank-name{font-size:14px;font-weight:500;flex:1;}
.rank-bar-bg{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rank-bar-fill{height:4px;border-radius:2px;}
.rank-dist{font-size:11px;color:var(--text-light);width:36px;text-align:right;}
.rank-desc{font-size:12px;color:var(--text-light);line-height:1.6;padding-left:26px;}

/* flag */
.flag-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#FFF8F0;border-left:3px solid #E8A44A;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13px;color:#7A5820;line-height:1.5;}

/* encouragement */
.encourage-block{padding:32px 24px;text-align:center;background:var(--surface);}
.encourage-verse{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;line-height:1.85;color:var(--text);margin-bottom:10px;}
.encourage-ref{font-size:12px;color:var(--text-light);margin-bottom:20px;}
.encourage-msg{font-size:13px;color:var(--text-muted);line-height:1.85;}

/* action buttons */
.action-btns{padding:20px 24px 40px;display:flex;flex-direction:column;gap:10px;}
.btn-outline{padding:14px;background:transparent;border:1px solid var(--border);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;text-align:center;transition:all .2s;}
.btn-outline:active{background:var(--bg);}
.btn-retry{padding:14px;background:transparent;border:1px solid var(--accent);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-line"></div>
  <h1 class="intro-title">나의 신앙 유형은<br>무엇인가요?</h1>
  <p class="intro-sub">80개의 질문을 통해<br>나의 신앙 여정을 더 깊이 이해합니다.</p>
  <div class="intro-meta">
    <div class="meta-item"><div class="meta-num">80</div><div class="meta-lbl">문항</div></div>
    <div class="meta-item"><div class="meta-num">4</div><div class="meta-lbl">영역</div></div>
    <div class="meta-item"><div class="meta-num">8</div><div class="meta-lbl">유형</div></div>
  </div>
  <button class="btn-primary" onclick="startAssessment()">검사 시작하기</button>
</div>

<!-- AXIS INTRO -->
<div class="screen" id="screen-axis">
  <div class="axis-circle" id="axisIcon"></div>
  <div class="axis-intro-title" id="axisTitle"></div>
  <div class="axis-intro-desc" id="axisDesc"></div>
  <div class="axis-intro-range" id="axisRange"></div>
  <button class="btn-primary" style="margin:36px 28px 0;width:calc(100% - 56px);" onclick="startAxis()">시작하기</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <div class="q-top">
    <span class="q-counter" id="qCounter"></span>
    <span class="q-axis-tag" id="qAxisTag"></span>
  </div>
  <div class="q-body">
    <div class="q-text" id="qText"></div>
    <div class="likert" id="likert"></div>
    <div class="likert-labels"><span>전혀 아니다</span><span>매우 그렇다</span></div>
    <div class="q-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">이전</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>
</div>

<!-- CALC -->
<div class="screen" id="screen-calc">
  <div class="calc-ring"></div>
  <div class="calc-text">나의 신앙 유형을 분석하고 있습니다...</div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header" id="resultHeader"></div>
  <div id="resultBody"></div>
  <div class="action-btns">
    <button class="btn-outline" onclick="saveAsJpg()">결과 이미지로 저장 (JPG)</button>
    <button class="btn-outline" onclick="saveAsPdf()">검사지 전체 저장 (PDF)</button>
    <button class="btn-retry" onclick="retry()">다시 검사하기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────
const AXES_INFO = [
  {id:'기반',color:'#534AB7',light:'#EEEDFE',dark:'#3C3489',
   title:'기본 정보 영역',desc:'신앙생활의 기반이 되는 환경, 관계, 경험, 습관을 살펴봅니다.',range:'Q1 — Q20'},
  {id:'인성',color:'#0F6E56',light:'#E1F5EE',dark:'#085041',
   title:'인성 영역',desc:'나의 성품, 관계 방식, 정서적 건강과 성장 의지를 살펴봅니다.',range:'Q21 — Q40'},
  {id:'신앙',color:'#993C1D',light:'#FAECE7',dark:'#712B13',
   title:'신앙 영역',desc:'영적 확신, 말씀과의 관계, 구원의 소망과 영적 성장을 살펴봅니다.',range:'Q41 — Q60'},
  {id:'환경',color:'#185FA5',light:'#E6F1FB',dark:'#0C447C',
   title:'환경 영역',desc:'현재 신앙생활을 둘러싼 외적 상황과 지지 체계를 살펴봅니다.',range:'Q61 — Q80'},
];

const QUESTIONS = [
  {a:'기반',n:1,t:'현재 살고 계신 곳에서 모임 장소까지 오가는 거리가 적당한가요?',r:false},
  {a:'기반',n:2,t:'평소 이용하시는 교통수단으로 이동하기에 편리한가요?',r:false},
  {a:'기반',n:3,t:'지금 하고 계신 일이나 수입이 생활을 유지하기에 안정적인가요?',r:false},
  {a:'기반',n:4,t:'경제적인 형편이 신앙 활동을 이어가는 데 적절한 바탕이 되고 있나요?',r:false},
  {a:'기반',n:5,t:'소중한 가족들이 나의 신앙 활동을 존중하고 응원해 주나요?',r:false},
  {a:'기반',n:6,t:'가족 중에 나의 신앙 고민을 함께 나누고 공감해 줄 분이 계신가요?',r:false},
  {a:'기반',n:7,t:'현재 가깝게 지내는 분이 나의 신앙에 좋은 영향을 주나요?',r:false},
  {a:'기반',n:8,t:'신앙을 시작한 기간만큼 나의 마음도 깊어지고 있다고 느끼시나요?',r:false},
  {a:'기반',n:9,t:'과거에 교회에서 활동했던 경험들이 지금의 나에게 큰 도움이 되나요?',r:false},
  {a:'기반',n:10,t:'내가 가진 재능이나 기술을 공동체를 위해 나누고 싶은 마음이 있나요?',r:false},
  {a:'기반',n:11,t:'평소 즐기는 취미 활동이 나의 일상에 건강한 활력을 불어넣어 주나요?',r:false},
  {a:'기반',n:12,t:'요즘 나의 주된 관심사들이 신앙과 연결되어 있나요?',r:false},
  {a:'기반',n:13,t:'새로운 사람들과 마음을 나누고 신뢰를 쌓는 일이 편안한가요?',r:false},

  {a:'기반',n:15,t:'누군가를 돕거나 이끄는 일에 보람을 느끼는 편인가요?',r:false},
  {a:'기반',n:16,t:'말씀을 체계적으로 배워본 경험이 신앙 토대를 튼튼하게 해주었나요?',r:false},
  {a:'기반',n:17,t:'이전에 배웠던 성경 공부 내용이 나의 삶에 실제적인 도움이 되었나요?',r:false},
  {a:'기반',n:18,t:'내가 신앙을 가지는 가장 큰 이유는 진리와 구원 때문인가요?',r:false},
  {a:'기반',n:19,t:'바쁜 일상 속에서도 예배나 모임 시간을 지키려 노력하시나요?',r:false},
  {a:'기반',n:20,t:'모임의 연락이나 메시지에 성실하고 빠르게 답해 주시는 편인가요?',r:false},
  {a:'인성',n:21,t:'처음 만나는 사람에게 먼저 다가가 인사를 나누는 편인가요?',r:false},

  {a:'인성',n:39,t:'지나간 일에 대한 후회보다는 다가올 미래를 기대하며 사시나요?',r:false},
  {a:'인성',n:40,t:'혼자 있는 시간에도 스스로의 양심에 비추어 정직하게 행동하시나요?',r:false},
  {a:'신앙',n:41,t:'보이지 않는 영적인 세계가 실재한다는 느낌을 일상에서 받으시나요?',r:false},

  {a:'신앙',n:43,t:'삶의 고비마다 기적 같은 도움이나 영적인 위로를 경험하셨나요?',r:false},

const WEIGHTS = {신앙:1.6, 인성:1.2, 환경:1.0, 기반:0.8};
const AXIS_ORDER = ['신앙','인성','환경','기반'];
const AXIS_COLORS = {기반:'#534AB7',인성:'#0F6E56',신앙:'#993C1D',환경:'#185FA5'};

// ── STATE ─────────────────────────────────────────────
let state = { qIdx:0, answers:{}, lastResult:null };

// ── NAVIGATION ────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function updateProgress() {
  document.getElementById('progressFill').style.width = Math.round((state.qIdx/QUESTIONS.length)*100)+'%';
}
function startAssessment() {
  state.qIdx = 0; state.answers = {};
  showAxisIntro('기반');
}
function showAxisIntro(axisId) {
  const info = AXES_INFO.find(a=>a.id===axisId);
  const el = document.getElementById('axisIcon');
  el.style.background = info.color;
  el.textContent = axisId;
  document.getElementById('axisTitle').textContent = info.title;
  document.getElementById('axisDesc').textContent = info.desc;
  document.getElementById('axisRange').textContent = info.range;
  show('axis');
}
function startAxis() { renderQuestion(); }
function renderQuestion() {
  if(state.qIdx >= QUESTIONS.length){ runClassify(); return; }
  const q = QUESTIONS[state.qIdx];
  const axInfo = AXES_INFO.find(a=>a.id===q.a);
  document.getElementById('qCounter').textContent = `${state.qIdx+1} / ${QUESTIONS.length}`;
  const tag = document.getElementById('qAxisTag');
  tag.textContent = q.a+' 영역';
  tag.style.background = axInfo.light;
  tag.style.color = axInfo.dark;
  document.getElementById('qText').textContent = q.t;
  const likert = document.getElementById('likert');
  likert.innerHTML = '';
  const cur = state.answers[q.n];
  [1,2,3,4,5].forEach(v=>{
    const btn = document.createElement('button');
    btn.className = 'likert-btn'+(cur===v?' selected':'');
    btn.textContent = v;
    if(cur===v){ btn.style.background=axInfo.color; btn.style.borderColor=axInfo.color; }
    btn.onclick = ()=>{
      state.answers[q.n] = v;
      document.querySelectorAll('.likert-btn').forEach(b=>{ b.classList.remove('selected'); b.style.background=''; b.style.borderColor=''; });
      btn.classList.add('selected'); btn.style.background=axInfo.color; btn.style.borderColor=axInfo.color;
      document.getElementById('btnNext').disabled = false;
    };
    likert.appendChild(btn);
  });
  document.getElementById('btnNext').disabled = !cur;
  document.getElementById('btnPrev').style.display = state.qIdx===0?'none':'block';
  updateProgress();
  show('question');
}
function nextQ() {
  state.qIdx++;
  if(state.qIdx < QUESTIONS.length){
    const q = QUESTIONS[state.qIdx];
    if(q.a !== QUESTIONS[state.qIdx-1].a) showAxisIntro(q.a);
    else renderQuestion();
  } else { runClassify(); }
}
function prevQ() { if(state.qIdx>0){ state.qIdx--; renderQuestion(); } }

// ── CLASSIFICATION ────────────────────────────────────
function runClassify() {
  show('calc');
  document.getElementById('progressFill').style.width = '100%';
  setTimeout(doClassify, 1400);
}
function doClassify() {
  const raw = {신앙:0,인성:0,환경:0,기반:0};
  QUESTIONS.forEach(q=>{ const v=state.answers[q.n]||3; raw[q.a] += q.r?6-v:v; });
  const norm = {};
  AXIS_ORDER.forEach(ax=>{ norm[ax]=Math.round(raw[ax]/100*100); });
  let ranked = TYPES.map(t=>({...t, d:Math.sqrt(AXIS_ORDER.reduce((s,ax)=>s+WEIGHTS[ax]*Math.pow(norm[ax]-t.p[ax],2),0))})).sort((a,b)=>a.d-b.d);
  if(norm['신앙']<=40){const c=ranked.filter(t=>t.name==='탐색형'||t.name==='준비형');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(norm['환경']<=35){const c=ranked.filter(t=>t.name==='광야형'||t.name==='인내형');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(AXIS_ORDER.every(ax=>norm[ax]>=78)){const rf=ranked.find(t=>t.name==='결실형');if(rf)ranked=[rf,...ranked.filter(t=>t.name!=='결실형')];}
  const flags = AXIS_ORDER.filter(ax=>norm[ax]<=35).map(ax=>ax+' 영역에서 어려움이 있는 것으로 보입니다. 편안한 마음으로 상담자와 이야기 나눠보세요.');
  state.lastResult = {ranked, norm, flags};
  renderResult(ranked, norm, flags);
}

// ── RESULT RENDER ─────────────────────────────────────
function renderResult(ranked, norm, flags) {
  const best = ranked[0];
  const analysis = best.analyze(norm, state.answers);

  document.getElementById('resultHeader').innerHTML = `
    <div class="result-badge" style="background:${best.light};color:${best.color}">나의 신앙 유형</div>
    <div class="result-typename" style="color:${best.color}">${best.name}</div>
    <div class="result-typesub">${best.sub}</div>
    <div class="result-quote">${best.quote}</div>`;

  let body = '';

  // flags
  if(flags.length){
    body += `<div class="result-section"><div class="section-label">함께 살펴볼 부분</div>${flags.map(f=>`<div class="flag-item">${f}</div>`).join('')}</div>`;
  }

  // radar + axis bars
  body += `<div class="result-section">
    <div class="section-label">영역별 점수</div>
    <div class="radar-wrap">${buildRadar(norm,best)}</div>
    ${AXIS_ORDER.map(ax=>`
      <div class="axis-bar-row">
        <span class="axis-bar-label" style="color:${AXIS_COLORS[ax]}">${ax}</span>
        <div class="axis-bar-bg"><div class="axis-bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div>
        <span class="axis-bar-val">${norm[ax]}</span>
      </div>`).join('')}
  </div>`;

  // traits
  body += `<div class="result-section">
    <div class="section-label">핵심 특성</div>
    <div class="analysis-block">
      <div class="ab-head" style="background:${best.light}">
        <div class="ab-head-dot" style="background:${best.color}"></div>
        <span style="color:${best.color};font-weight:500">나의 이야기</span>
      </div>
      <div class="ab-body">${analysis.traits.map(t=>`<p>${t}</p>`).join('')}</div>
    </div>
  </div>`;

  // growth
  body += `<div class="result-section">
    <div class="section-label">나아갈 방향</div>
    <div class="analysis-block">
      <div class="ab-head" style="background:#EAF3DE">
        <div class="ab-head-dot" style="background:#3B6D11"></div>
        <span style="color:#3B6D11;font-weight:500">내가 성장할 수 있는 부분</span>
      </div>
      <div class="ab-body">${analysis.growth.map(t=>`<p>${t}</p>`).join('')}</div>
    </div>
  </div>`;

  // counsel — phrased as self-reflection
  body += `<div class="result-section">
    <div class="section-label">나에게 건네는 말</div>
    <div class="analysis-block">
      <div class="ab-head" style="background:#E6F1FB">
        <div class="ab-head-dot" style="background:#185FA5"></div>
        <span style="color:#185FA5;font-weight:500">지금 나에게 필요한 것</span>
      </div>
      <div class="ab-body">${analysis.counsel.map(t=>`<p>${t}</p>`).join('')}</div>
    </div>
  </div>`;

  // rank with descriptions
  const maxD = Math.max(...ranked.map(r=>r.d));
  body += `<div class="result-section">
    <div class="section-label">전체 유형 유사도</div>
    ${ranked.map((t,i)=>`
      <div class="rank-item">
        <div class="rank-top">
          <span class="rank-num">${i+1}</span>
          <span class="rank-dot" style="background:${t.color}"></span>
          <span class="rank-name">${t.name}</span>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.round((1-t.d/maxD)*100)}%;background:${t.color}"></div></div>
          <span class="rank-dist">${Math.round(t.d)}</span>
        </div>
        <div class="rank-desc">${t.rankDesc}</div>
      </div>`).join('')}
  </div>`;

  // encouragement
  const enc = best.encourage;
  body += `<div class="encourage-block">
    <div class="encourage-verse">${enc.verse}</div>
    <div class="encourage-ref"></div>
    <div class="encourage-msg">${enc.msg}</div>
  </div>`;

  document.getElementById('resultBody').innerHTML = body;
  show('result');
}

// ── RADAR ─────────────────────────────────────────────
function buildRadar(norm, best) {
  const cx=100,cy=100,r=68,N=4;
  const pts = AXIS_ORDER.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,v=norm[ax]/100;return[cx+r*v*Math.cos(a),cy+r*v*Math.sin(a)];});
  const bg  = AXIS_ORDER.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const toP = arr=>arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  const grid = [.25,.5,.75,1].map(s=>{const gp=AXIS_ORDER.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*s*Math.cos(a),cy+r*s*Math.sin(a)];});return`<path d="${toP(gp)}" fill="none" stroke="#E8E3DC" stroke-width="1"/>`;}).join('');
  const lbls = AXIS_ORDER.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a),anch=Math.abs(Math.cos(a))<.1?'middle':Math.cos(a)>0?'start':'end';return`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="${anch}" font-size="11" fill="${AXIS_COLORS[ax]}" font-family="'Noto Sans KR',sans-serif" font-weight="500">${ax}</text>`;}).join('');
  return `<svg width="200" height="200" viewBox="0 0 200 200">${grid}<path d="${toP(bg)}" fill="none" stroke="#D5CEC5" stroke-width="1"/><path d="${toP(pts)}" fill="${best.color}" fill-opacity="0.15" stroke="${best.color}" stroke-width="2"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${best.color}"/>`).join('')}${lbls}</svg>`;
}

// ── EXPORT ────────────────────────────────────────────
function saveAsJpg() {
  const btn = event.target;
  btn.textContent = '이미지 생성 중...';
  btn.disabled = true;
  const el = document.getElementById('screen-result');
  html2canvas(el, {scale:2, useCORS:true, backgroundColor:'#F8F6F1', scrollY:-window.scrollY}).then(canvas=>{
    const link = document.createElement('a');
    link.download = '신앙유형검사_결과.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    btn.textContent = '결과 이미지로 저장 (JPG)';
    btn.disabled = false;
  }).catch(()=>{ btn.textContent='결과 이미지로 저장 (JPG)'; btn.disabled=false; alert('이미지 저장 중 오류가 발생했습니다.'); });
}

  </style></head><body>
  <div class="badge">나의 신앙 유형</div>

  ${AXIS_ORDER.map(ax=>`<div class="score-row"><div class="score-name" style="color:${AXIS_COLORS[ax]}">${ax}</div><div class="bar-bg"><div class="bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div><div class="score-val">${norm[ax]}</div></div>`).join('')}
  <div class="divider"></div>
  <div class="label">핵심 특성</div>
  <div class="block">${analysis.traits.map(t=>`<p>${t}</p>`).join('')}</div>
  <div class="label">나아갈 방향</div>

function retry() { startAssessment(); }
