<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>신앙 유형 검사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{--bg:#F8F6F1;--surface:#FFFFFF;--text:#1A1814;--text-muted:#7A7568;--text-light:#B0A99E;--border:#E8E3DC;--accent:#3D3526;--ph:3px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.progress-bar{position:fixed;top:0;left:0;right:0;height:var(--ph);background:var(--border);z-index:100;}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#screen-intro{justify-content:center;align-items:center;padding:60px 28px;text-align:center;}
.intro-line{width:48px;height:1px;background:var(--accent);margin:0 auto 32px;}
.intro-title{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1.35;margin-bottom:14px;}
.intro-sub{font-size:13px;color:var(--text-muted);line-height:1.9;margin-bottom:40px;}
.intro-meta{display:flex;gap:28px;justify-content:center;margin-bottom:44px;}
.meta-item{text-align:center;}
.meta-num{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;}
.meta-lbl{font-size:11px;color:var(--text-light);margin-top:3px;}
.btn-primary{display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:opacity .2s;}
.btn-primary:active{opacity:.85;}
#screen-axis{justify-content:center;align-items:center;padding:56px 28px;text-align:center;}
.axis-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:11px;font-weight:500;color:#fff;letter-spacing:.3px;}
.axis-intro-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:600;margin-bottom:10px;}
.axis-intro-desc{font-size:13px;color:var(--text-muted);line-height:1.85;margin-bottom:10px;}
.axis-intro-range{font-size:11px;color:var(--text-light);}
#screen-question{padding-top:var(--ph);}
.q-top{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.q-counter{font-size:11px;color:var(--text-light);letter-spacing:.5px;}
.q-axis-tag{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.3px;}
.q-body{flex:1;padding:28px 24px 24px;display:flex;flex-direction:column;}
.q-text{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:400;line-height:1.7;flex:1;margin-bottom:40px;}
.likert{display:flex;gap:8px;margin-bottom:20px;}
.likert-btn{flex:1;aspect-ratio:1;border:1.5px solid var(--border);background:var(--surface);border-radius:4px;font-size:15px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.likert-btn.selected{border-width:2px;color:#fff;}
.likert-btn:active{transform:scale(.95);}
.likert-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);padding:0 2px;margin-bottom:32px;}
.q-nav{display:flex;gap:10px;}
.btn-prev{padding:14px 20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;}
.btn-next{flex:1;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;}
.btn-next:disabled{opacity:.35;cursor:default;}
#screen-calc{justify-content:center;align-items:center;padding:48px 28px;text-align:center;}
.calc-ring{width:64px;height:64px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;}
@keyframes spin{to{transform:rotate(360deg);}}
.calc-text{font-size:14px;color:var(--text-muted);}
#screen-result{padding:0;}
.result-header{padding:52px 28px 32px;text-align:center;border-bottom:1px solid var(--border);}
.result-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;letter-spacing:.3px;margin-bottom:16px;}
.result-typename{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:600;margin-bottom:6px;}
.result-typesub{font-size:14px;color:var(--text-muted);margin-bottom:4px;}
.result-quote{font-size:13px;color:var(--text-light);font-style:italic;margin-top:16px;line-height:1.7;}
.result-section{padding:28px 24px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--text-light);text-transform:uppercase;margin-bottom:16px;}
.radar-wrap{display:flex;justify-content:center;margin:4px 0 16px;}
.axis-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.axis-bar-label{font-size:13px;font-weight:500;width:52px;flex-shrink:0;}
.axis-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.axis-bar-fill{height:6px;border-radius:3px;transition:width .6s ease;}
.axis-bar-val{font-size:13px;font-weight:500;width:32px;text-align:right;flex-shrink:0;}
.analysis-block{margin-bottom:14px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.ab-head{padding:12px 16px;font-size:11px;font-weight:500;letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.ab-head-dot{width:6px;height:6px;border-radius:50%;}
.ab-body{padding:14px 16px;background:#fff;}
.ab-body p{font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px;}
.ab-body p:last-child{margin-bottom:0;}
.apt-list{display:flex;flex-direction:column;gap:10px;}
.apt-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-radius:6px;border:1px solid var(--border);}
.apt-rank{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;width:24px;flex-shrink:0;text-align:center;}
.apt-info{flex:1;}
.apt-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
.apt-desc{font-size:12px;color:var(--text-light);line-height:1.5;}
.apt-bar-bg{width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;}
.apt-bar-fill{height:5px;border-radius:3px;}
.apt-score{font-size:12px;color:var(--text-light);width:24px;text-align:right;flex-shrink:0;}
.rank-item{padding:12px 0;border-bottom:1px solid var(--border);}
.rank-item:last-child{border-bottom:none;}
.rank-top{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.rank-num{font-size:11px;color:var(--text-light);width:16px;}
.rank-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rank-name{font-size:14px;font-weight:500;flex:1;}
.rank-bar-bg{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rank-bar-fill{height:4px;border-radius:2px;}
.rank-dist{font-size:11px;color:var(--text-light);width:36px;text-align:right;}
.rank-desc{font-size:12px;color:var(--text-light);line-height:1.6;padding-left:26px;}
.flag-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#FFF8F0;border-left:3px solid #E8A44A;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13px;color:#7A5820;line-height:1.5;}
.encourage-block{padding:36px 28px;text-align:center;background:var(--surface);border-bottom:1px solid var(--border);}
.encourage-verse{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:400;line-height:1.9;color:var(--text);margin-bottom:8px;white-space:pre-line;}
.encourage-ref{font-size:12px;color:var(--text-light);margin-bottom:20px;}
.encourage-msg{font-size:13px;color:var(--text-muted);line-height:1.9;}
.action-btns{padding:20px 24px 48px;display:flex;flex-direction:column;gap:10px;}
.btn-outline{padding:14px;background:transparent;border:1px solid var(--border);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;text-align:center;transition:all .2s;}
.btn-outline:active{background:var(--bg);}
.btn-retry{padding:14px;background:transparent;border:1px solid var(--accent);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="screen active" id="screen-intro">
  <div class="intro-line"></div>
  <h1 class="intro-title">나의 신앙 유형은<br>무엇인가요?</h1>
  <p class="intro-sub">74개의 질문을 통해<br>나의 신앙 여정을 더 깊이 이해합니다.</p>
  <div class="intro-meta">
    <div class="meta-item"><div class="meta-num">74</div><div class="meta-lbl">문항</div></div>
    <div class="meta-item"><div class="meta-num">5</div><div class="meta-lbl">영역</div></div>
    <div class="meta-item"><div class="meta-num">8</div><div class="meta-lbl">유형</div></div>
  </div>
  <button class="btn-primary" onclick="startAssessment()">검사 시작하기</button>
</div>
<div class="screen" id="screen-axis">
  <div class="axis-circle" id="axisIcon"></div>
  <div class="axis-intro-title" id="axisTitle"></div>
  <div class="axis-intro-desc" id="axisDesc"></div>
  <div class="axis-intro-range" id="axisRange"></div>
  <button class="btn-primary" style="margin:36px 28px 0;width:calc(100% - 56px);" onclick="startAxis()">시작하기</button>
</div>
<div class="screen" id="screen-question">
  <div class="q-top">
    <span class="q-counter" id="qCounter"></span>
    <span class="q-axis-tag" id="qAxisTag"></span>
  </div>
  <div class="q-body">
    <div class="q-text" id="qText"></div>
    <div class="likert" id="likert"></div>
    <div class="likert-labels"><span>전혀 아니다</span><span>매우 그렇다</span></div>
    <div class="q-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">이전</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>
</div>
<div class="screen" id="screen-calc">
  <div class="calc-ring"></div>
  <div class="calc-text">나의 신앙 유형을 분석하고 있습니다...</div>
</div>
<div class="screen" id="screen-result">
  <div class="result-header" id="resultHeader"></div>
  <div id="resultBody"></div>
  <div class="action-btns">
    <button class="btn-outline" onclick="saveAsJpg()">결과 이미지로 저장 (JPG)</button>
    <button class="btn-outline" onclick="saveAsPdf()">검사지 전체 저장 (PDF)</button>
    <button class="btn-retry" onclick="retry()">다시 검사하기</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const AXES_INFO=[
  {id:'인성',color:'#0F6E56',light:'#E1F5EE',dark:'#085041',title:'인성 영역',desc:'나의 성품, 관계 방식, 정서적 건강과 성장 의지를 살펴봅니다.',range:'1 — 20번'},
  {id:'신성',color:'#993C1D',light:'#FAECE7',dark:'#712B13',title:'신성 영역',desc:'영적 확신, 말씀과의 관계, 구원의 소망과 영적 성장을 살펴봅니다.',range:'21 — 40번'},
  {id:'환경',color:'#185FA5',light:'#E6F1FB',dark:'#0C447C',title:'환경 영역',desc:'현재 신앙생활을 둘러싼 외적 상황과 지지 체계를 살펴봅니다.',range:'41 — 59번'},
  {id:'에너지',color:'#7A4F9B',light:'#F0EAFE',dark:'#4B2E74',title:'변화 에너지 영역',desc:'신앙 안에서 새로운 성장을 향한 나의 내적 에너지를 살펴봅니다.',range:'60 — 64번'},
  {id:'적성',color:'#5F5E5A',light:'#F1EFE8',dark:'#2C2C2A',title:'성장 적성 영역',desc:'신앙 안에서 나에게 가장 잘 맞는 성장 방식과 역할을 찾아봅니다.',range:'65 — 74번'},
];
const QUESTIONS=[
  {a:'인성',n:1,t:'새로운 사람들과 마음을 나누고 신뢰를 쌓는 일이 편안한가요?',r:false},
  {a:'인성',n:2,t:'공동체 안에 내 속마음을 편히 털어놓을 친한 사람이 있나요?',r:false},
  {a:'인성',n:3,t:'누군가를 돕거나 이끄는 일에 보람을 느끼는 편인가요?',r:false},
  {a:'인성',n:4,t:'처음 만나는 사람에게 먼저 다가가 인사를 나누는 것이 자연스러운가요?',r:false},
  {a:'인성',n:5,t:'주변 사람들은 나를 함께 있으면 편안하고 믿음직한 사람으로 보나요?',r:false},
  {a:'인성',n:6,t:'갈등이 생겼을 때, 감정보다 화해를 위해 먼저 노력하는 편인가요?',r:false},
  {a:'인성',n:7,t:'주변의 시선에 휘둘리지 않고 내 소신껏 결정하는 편인가요?',r:false},
  {a:'인성',n:8,t:'다른 사람과의 약속이나 모임 시간을 철저히 지키시나요?',r:false},
  {a:'인성',n:9,t:'누군가를 대할 때 존중하는 마음과 부드러운 태도를 유지하시나요?',r:false},
  {a:'인성',n:10,t:'과거의 아픈 기억들로부터 자유로워져 현재의 삶에 집중하고 계신가요?',r:false},
  {a:'인성',n:11,t:'현재의 즐거움보다 더 가치 있고 의미 있는 일을 찾으려 노력하나요?',r:false},
  {a:'인성',n:12,t:'나의 부족한 점을 발견했을 때, 더 나은 모습으로 변화하고 싶으신가요?',r:false},
  {a:'인성',n:13,t:'힘든 일이 생겼을 때, 주저하지 않고 도움을 요청하시나요?',r:false},
  {a:'인성',n:14,t:'평소 마음이 평안하며, 우울하거나 무기력한 기분을 잘 이겨내나요?',r:false},
  {a:'인성',n:15,t:'내가 꿈꾸는 미래와 현재의 삶이 조화롭게 연결되어 있나요?',r:false},
  {a:'인성',n:16,t:'한 번 시작한 일은 끝까지 책임지고 마무리하는 편인가요?',r:false},
  {a:'인성',n:17,t:'주변의 조언이나 충고가 나를 향한 관심과 사랑으로 느껴지시나요?',r:false},
  {a:'인성',n:18,t:'기복 없이 일상의 중심을 잘 잡으려고 노력하시나요?',r:false},
  {a:'인성',n:19,t:'스스로의 양심에 비추어 언제나 정직하게 행동하려고 하시나요?',r:false},
  {a:'인성',n:20,t:'공동체 내에서 맡은 작은 역할에 최선을 다해 임하시는 편인가요?',r:false},
  {a:'신성',n:21,t:'신앙생활을 통해 내면이 조금씩 깊어지고 있다고 느끼시나요?',r:false},
  {a:'신성',n:22,t:'내가 가진 재능이나 기술을 공동체를 위해 나누고 싶은 마음이 있나요?',r:false},
  {a:'신성',n:23,t:'요즘 나의 주된 관심사들이 신앙적인 가치와 연결되어 있나요?',r:false},
  {a:'신성',n:24,t:'말씀을 체계적으로 배워본 경험이 신앙의 기초를 튼튼하게 해주었나요?',r:false},
  {a:'신성',n:25,t:'성경 공부 내용이 나의 실제 삶에 구체적인 도움이 되고 있나요?',r:false},
  {a:'신성',n:26,t:'내가 신앙을 가지는 가장 큰 이유는 진리와 구원 때문인가요?',r:false},
  {a:'신성',n:27,t:'보이지 않는 영적인 세계가 실재한다는 느낌을 일상에서 받으시나요?',r:false},
  {a:'신성',n:28,t:'성경 말씀이 나에게 답을 주는 변치 않는 진리라고 느껴지시나요?',r:false},
  {a:'신성',n:29,t:'삶의 고비마다 영적인 위로나 도움을 경험하셨나요?',r:false},
  {a:'신성',n:30,t:'신앙인으로서의 삶을 선택한 나 자신에 대해 긍정적인가요?',r:false},
  {a:'신성',n:31,t:'말씀을 공부한 후에 나의 생각이나 행동이 실제로 변화되었나요?',r:false},
  {a:'신성',n:32,t:'천국에 대한 소망이 현재의 어려움을 이겨내는 힘이 되나요?',r:false},
  {a:'신성',n:33,t:'성경의 뜻을 더 깊이 알고 싶은 갈급함이 있나요?',r:false},
  {a:'신성',n:34,t:'건강한 신앙을 위해 옳고 그름을 분별하는 것이 중요하다고 생각하시나요?',r:false},
  {a:'신성',n:35,t:'내가 가진 고정관념이 새로운 배움을 받아들이는 데 영향을 주나요?',r:true},
  {a:'신성',n:36,t:'일상에서 일어나는 일들을 영적인 눈으로 해석하려고 노력하시나요?',r:false},
  {a:'신성',n:37,t:'영적인 평안을 위해 육체적인 편안함을 잠시 내려놓으실 수 있나요?',r:false},
  {a:'신성',n:38,t:'사람들의 인정보다 하나님 앞에서 정직한 것을 더 중요하다 생각하시나요?',r:false},
  {a:'신성',n:39,t:'어떤 상황에서도 흔들리지 않는 구원에 대한 확신이 있나요?',r:false},
  {a:'신성',n:40,t:'신앙 선배나 인도자들의 조언을 신뢰하고 따르는 편이신가요?',r:false},

   analyze(norm,ans){const env=norm['환경'],f=norm['신성'],c=norm['인성'],q45s=ans[45]||3,q53s=ans[53]||3;return{traits:[`환경 영역(${env}점)에서 높은 점수가 나타났습니다. ${q45s>=4?'가족들이 나의 신앙 활동을 이해하고 응원해 준다는 것은 신앙생활을 지속하는 데 정말 큰 힘이 됩니다. 많은 사람들이 이 환경 하나 때문에 신앙의 어려움을 겪기도 합니다.':'나를 둘러싼 환경이 신앙생활을 이어가기에 적절하게 갖추어져 있다는 것은 귀한 일입니다.'} ${q53s>=4?'신앙을 함께 지지해주는 지인들이 있다는 것도 드러났습니다.':''}`,`신성 영역은 현재 ${f}점으로, 외적인 환경에 비해 내면의 신앙 확신이 아직 자라는 중일 수 있습니다. 좋은 환경 덕분에 자연스럽게 신앙 안에 있는 것과, 내가 스스로 확신을 가지고 걸어가는 것은 조금 다른 이야기입니다.`,`지금의 좋은 환경은 하나님이 주신 귀한 선물입니다. 그 토대 위에서, "내가 왜 이 신앙을 선택하는가"라는 내면의 질문에 조금씩 답해 가는 시간이 필요합니다.`],growth:[`좋은 환경(${env}점)이 주어져 있다는 것은, 신앙 성장에 집중할 수 있는 최적의 조건이 갖추어져 있다는 의미입니다. 지금은 이 환경을 적극적으로 활용해서 말씀 공부나 소그룹 모임에 참여해 볼 수 있는 좋은 시기입니다.`,`내면의 신앙(${f}점)이 외적 환경과 균형을 이루어 갈수록, 어떤 상황에서도 흔들리지 않는 신앙의 뿌리가 생겨납니다.`],counsel:[`지금 나를 응원해 주는 사람들, 나의 신앙을 존중해 주는 환경에 대한 감사를 먼저 표현해 보세요. 그 감사함이 신앙의 진짜 출발점이 될 수 있습니다.`,`"나는 왜 신앙을 가지고 있는가?"라는 질문을 혼자 조용히 앉아 생각해 보는 시간을 가져보세요. 이 질문에 대한 나만의 답이 생길 때, 신앙이 한 단계 더 깊어집니다.`]};}

   analyze(norm,ans){const env=norm['환경'],f=norm['신성'],e=norm['에너지'],hard=[];if((6-(ans[54]||3))<=2)hard.push('재정적인 부담');if((6-(ans[55]||3))<=2)hard.push('가족 간의 갈등');if((6-(ans[50]||3))<=2)hard.push('일상 습관의 어려움');return{traits:[`환경 영역이 ${env}점으로 나타났습니다. ${hard.length>0?`특히 응답을 살펴보면 ${hard.join(', ')}이(가) 신앙생활을 이어가는 데 실질적인 어려움이 되고 있는 것으로 보입니다.`:'주변 상황이 신앙생활에 부담을 주고 있는 것으로 나타났습니다.'} 이런 상황에서도 신앙을 이어가려는 마음이 있다는 것 자체가 대단한 일입니다.`,`신성 영역은 ${f}점으로, 어려운 환경 속에서도 내면에 신앙을 향한 의지와 갈망이 남아 있습니다. 광야를 걷는 것은 신앙이 약해서가 아니라, 지금 그 길을 걷고 있기 때문입니다.`,`외적인 환경이 이렇게 힘든 상황에서는 스스로를 탓하거나 "나는 왜 이럴까"라는 생각이 들 수 있습니다. 하지만 지금의 어려움은 나의 부족함이 아니라, 단지 지금 처한 상황입니다. 그것을 먼저 인정해 주세요.`],growth:[`지금 당장 신앙적으로 더 열심히 하려는 노력보다, 현실적인 어려움을 하나씩 정리해 나가는 것이 진짜 성장입니다. 환경이 나아질수록 신앙도 자연스럽게 더 깊어질 수 있습니다.`,`혼자 모든 것을 해결하려 하지 않아도 됩니다. 지금 나의 상황을 솔직하게 나눌 수 있는 한 사람을 찾아 이야기하는 것이 이 시기에 가장 필요한 한 걸음입니다.`],counsel:[`지금 겪고 있는 어려움을 솔직하게 표현해도 괜찮습니다. 힘들다고 말하는 것은 신앙이 약한 것이 아니라, 오히려 나를 돌볼 줄 아는 것입니다.`,`작은 것 하나에 감사하는 연습을 해보세요. 어두운 광야에서도 빛 한 줄기를 찾는 그 눈이, 결국 나를 앞으로 나아가게 합니다.`]};}

   p:{인성:50,신성:40,환경:52,에너지:60},
   rankDesc:'신앙의 시작 단계에 있으며, 모든 것이 아직 새롭고 낯선 유형',
   encourage:{verse:'"너는 내 종이라 내가 너를 택하고 싫어하여 버리지 아니하였노라\n두려워하지 말라 내가 너와 함께함이니라\n나는 네 하나님이 됨이라 내가 너를 굳세게 하리라\n참으로 너를 도와주리라"',ref:'이사야 41:9-10',msg:'지금 이 자리에서 한 걸음을 내딛은 당신이 이미 충분합니다. 처음이라서 낯설고 어색한 것은 너무나 자연스러운 일입니다. 당신의 속도대로 걸어가도 됩니다.'},
   analyze(norm,ans){const f=norm['신성'],c=norm['인성'],base=norm['환경'],e=norm['에너지'],q21s=ans[21]||3,q33s=ans[33]||3;return{traits:[`전반적으로 신성(${f}점), 인성(${c}점), 환경(${base}점) 모두 아직 형성되어 가는 초기 단계에 있습니다. 이것은 부족하다는 의미가 아니라, 지금 출발점에 서 있다는 의미입니다. ${q21s>=3?'신앙생활을 통해 내면이 조금씩 깊어지고 있다는 응답이 있었는데, 이 느낌을 소중히 여기세요.':''}`,`${q33s>=3?'말씀을 더 알고 싶다는 마음이 이미 있다는 것':'지금 이 검사를 완료했다는 것'}은, 신앙에 대한 관심과 의지가 있다는 것을 보여줍니다. 처음이 있어야 성장도 있습니다.`,`모든 것이 낯설고 어색하게 느껴지는 것은 아주 자연스럽습니다. 지금 단계에서는 완벽하게 이해하거나 잘 하려는 마음보다, 꾸준히 자리에 있는 것이 더 중요합니다.`],growth:[`지금 가장 필요한 것은 신앙의 기초를 편안하게 배울 수 있는 환경과 함께해 줄 사람입니다. 한꺼번에 많은 것을 알려고 하기보다, 한 가지씩 경험하고 느껴가는 것이 이 시기에 맞는 성장 방식입니다.`,`소그룹 모임이나 기초 성경 공부에 부담 없이 참여해 보는 것이 좋은 시작이 될 수 있습니다.`],counsel:[`"아직 잘 모른다"는 것은 전혀 부끄러운 일이 아닙니다. 지금의 낯섦이 나중에 "그때 내가 시작했구나"라는 소중한 기억이 됩니다.`,`내 속도로 걸어가도 됩니다. 누군가와 비교하지 말고, 오늘 이 자리에 있는 나 자신에게 먼저 따뜻하게 대해 주세요.`]};}
  },
];
const WEIGHTS={인성:1.2,신성:1.6,환경:1.0,에너지:0.8};
const AXIS_4=['인성','신성','환경','에너지'];
const AXIS_COLORS={인성:'#0F6E56',신성:'#993C1D',환경:'#185FA5',에너지:'#7A4F9B'};
let state={qIdx:0,answers:{},lastResult:null};
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}
function updateProgress(){document.getElementById('progressFill').style.width=Math.round((state.qIdx/QUESTIONS.length)*100)+'%';}
function startAssessment(){state.qIdx=0;state.answers={};showAxisIntro('인성');}
function showAxisIntro(axisId){const info=AXES_INFO.find(a=>a.id===axisId);const el=document.getElementById('axisIcon');el.style.background=info.color;el.textContent=axisId;document.getElementById('axisTitle').textContent=info.title;document.getElementById('axisDesc').textContent=info.desc;document.getElementById('axisRange').textContent=info.range;show('axis');}
function startAxis(){renderQuestion();}
function renderQuestion(){
  if(state.qIdx>=QUESTIONS.length){runClassify();return;}
  const q=QUESTIONS[state.qIdx];const axInfo=AXES_INFO.find(a=>a.id===q.a);
  document.getElementById('qCounter').textContent=`${state.qIdx+1} / ${QUESTIONS.length}`;
  const tag=document.getElementById('qAxisTag');tag.textContent=q.a+' 영역';tag.style.background=axInfo.light;tag.style.color=axInfo.dark;
  document.getElementById('qText').textContent=q.t;
  const likert=document.getElementById('likert');likert.innerHTML='';const cur=state.answers[q.n];
  [1,2,3,4,5].forEach(v=>{const btn=document.createElement('button');btn.className='likert-btn'+(cur===v?' selected':'');btn.textContent=v;if(cur===v){btn.style.background=axInfo.color;btn.style.borderColor=axInfo.color;}btn.onclick=()=>{state.answers[q.n]=v;document.querySelectorAll('.likert-btn').forEach(b=>{b.classList.remove('selected');b.style.background='';b.style.borderColor='';});btn.classList.add('selected');btn.style.background=axInfo.color;btn.style.borderColor=axInfo.color;document.getElementById('btnNext').disabled=false;};likert.appendChild(btn);});
  document.getElementById('btnNext').disabled=!cur;document.getElementById('btnPrev').style.display=state.qIdx===0?'none':'block';
  updateProgress();show('question');
}
function nextQ(){state.qIdx++;if(state.qIdx<QUESTIONS.length){const q=QUESTIONS[state.qIdx];if(q.a!==QUESTIONS[state.qIdx-1].a)showAxisIntro(q.a);else renderQuestion();}else{runClassify();}}
function prevQ(){if(state.qIdx>0){state.qIdx--;renderQuestion();}}
function runClassify(){show('calc');document.getElementById('progressFill').style.width='100%';setTimeout(doClassify,1400);}
function doClassify(){
  const raw={인성:0,신성:0,환경:0,에너지:0};const cnt={인성:0,신성:0,환경:0,에너지:0};
  QUESTIONS.filter(q=>q.a!=='적성').forEach(q=>{const v=state.answers[q.n]||3;raw[q.a]+=(q.r?6-v:v);cnt[q.a]++;});
  const norm={};AXIS_4.forEach(ax=>{norm[ax]=Math.round(raw[ax]/(cnt[ax]*5)*100);});
  const aptScores={};QUESTIONS.filter(q=>q.a==='적성').forEach(q=>{aptScores[q.apt]=state.answers[q.n]||3;});
  const aptRanked=Object.entries(aptScores).sort((a,b)=>b[1]-a[1]);
  let ranked=FAITH_TYPES.map(t=>({...t,d:Math.sqrt(AXIS_4.reduce((s,ax)=>s+WEIGHTS[ax]*Math.pow(norm[ax]-t.p[ax],2),0))})).sort((a,b)=>a.d-b.d);
  if(norm['신성']<=40){const c=ranked.filter(t=>t.name==='탐색형'||t.name==='준비형');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(norm['환경']<=35){const c=ranked.filter(t=>t.name==='광야형'||t.name==='인내형');if(c.length&&c[0].d<ranked[0].d*1.3)ranked=[c[0],...ranked.filter(t=>t.name!==c[0].name)];}
  if(AXIS_4.every(ax=>norm[ax]>=78)){const rf=ranked.find(t=>t.name==='결실형');if(rf)ranked=[rf,...ranked.filter(t=>t.name!=='결실형')];}
  const flags=AXIS_4.filter(ax=>norm[ax]<=35).map(ax=>ax+' 영역에서 어려움이 있는 것으로 보입니다. 편안한 마음으로 상담자와 이야기 나눠보세요.');
  state.lastResult={ranked,norm,flags,aptRanked};renderResult(ranked,norm,flags,aptRanked);
}
function renderResult(ranked,norm,flags,aptRanked){
  const best=ranked[0];const analysis=best.analyze(norm,state.answers);
  document.getElementById('resultHeader').innerHTML=`<div class="result-badge" style="background:${best.light};color:${best.color}">나의 신앙 유형</div><div class="result-typename" style="color:${best.color}">${best.name}</div><div class="result-typesub">${best.sub}</div><div class="result-quote">${best.quote}</div>`;
  let body='';
  if(flags.length){body+=`<div class="result-section"><div class="section-label">함께 살펴볼 부분</div>${flags.map(f=>`<div class="flag-item">${f}</div>`).join('')}</div>`;}
  body+=`<div class="result-section"><div class="section-label">영역별 점수</div><div class="radar-wrap">${buildRadar(norm,best)}</div>${AXIS_4.map(ax=>`<div class="axis-bar-row"><span class="axis-bar-label" style="color:${AXIS_COLORS[ax]}">${ax}</span><div class="axis-bar-bg"><div class="axis-bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div><span class="axis-bar-val">${norm[ax]}</span></div>`).join('')}</div>`;
  body+=`<div class="result-section"><div class="section-label">핵심 특성</div><div class="analysis-block"><div class="ab-head" style="background:${best.light}"><div class="ab-head-dot" style="background:${best.color}"></div><span style="color:${best.color};font-weight:500">나의 이야기</span></div><div class="ab-body">${analysis.traits.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  body+=`<div class="result-section"><div class="section-label">나아갈 방향</div><div class="analysis-block"><div class="ab-head" style="background:#EAF3DE"><div class="ab-head-dot" style="background:#3B6D11"></div><span style="color:#3B6D11;font-weight:500">내가 성장할 수 있는 부분</span></div><div class="ab-body">${analysis.growth.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  body+=`<div class="result-section"><div class="section-label">나에게 건네는 말</div><div class="analysis-block"><div class="ab-head" style="background:#E6F1FB"><div class="ab-head-dot" style="background:#185FA5"></div><span style="color:#185FA5;font-weight:500">지금 나에게 필요한 것</span></div><div class="ab-body">${analysis.counsel.map(t=>`<p>${t}</p>`).join('')}</div></div></div>`;
  const aptColors=['#534AB7','#0F6E56','#185FA5','#854F0B','#993C1D'];
  body+=`<div class="result-section"><div class="section-label">나의 성장 적성</div><div class="apt-list">${aptRanked.map(([name,score],i)=>{const info=APT_TYPES[name]||{desc:''};const pct=Math.round((score/5)*100);const col=aptColors[i%aptColors.length];return`<div class="apt-item"><div class="apt-rank" style="color:${i<3?col:'var(--text-light)'}">${i+1}</div><div class="apt-info"><div class="apt-name">${name}</div><div class="apt-desc">${info.desc}</div></div><div class="apt-bar-bg"><div class="apt-bar-fill" style="width:${pct}%;background:${i<3?col:'var(--border)'}"></div></div><div class="apt-score">${score}</div></div>`;}).join('')}</div></div>`;
  const maxD=Math.max(...ranked.map(r=>r.d));
  body+=`<div class="result-section"><div class="section-label">전체 유형 유사도</div>${ranked.map((t,i)=>`<div class="rank-item"><div class="rank-top"><span class="rank-num">${i+1}</span><span class="rank-dot" style="background:${t.color}"></span><span class="rank-name">${t.name}</span><div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.round((1-t.d/maxD)*100)}%;background:${t.color}"></div></div><span class="rank-dist">${Math.round(t.d)}</span></div><div class="rank-desc">${t.rankDesc}</div></div>`).join('')}</div>`;
  const enc=best.encourage;
  body+=`<div class="encourage-block"><div class="encourage-verse">${enc.verse}</div><div class="encourage-ref">${enc.ref}</div><div class="encourage-msg">${enc.msg}</div></div>`;
  document.getElementById('resultBody').innerHTML=body;show('result');
}
function buildRadar(norm,best){
  const cx=100,cy=100,r=68,N=4;
  const pts=AXIS_4.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,v=norm[ax]/100;return[cx+r*v*Math.cos(a),cy+r*v*Math.sin(a)];});
  const bg=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  const toP=arr=>arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  const grid=[.25,.5,.75,1].map(s=>{const gp=AXIS_4.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*s*Math.cos(a),cy+r*s*Math.sin(a)];});return`<path d="${toP(gp)}" fill="none" stroke="#E8E3DC" stroke-width="1"/>`;}).join('');
  const lbls=AXIS_4.map((ax,i)=>{const a=Math.PI*2*i/N-Math.PI/2,lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a),anch=Math.abs(Math.cos(a))<.1?'middle':Math.cos(a)>0?'start':'end';return`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="${anch}" font-size="11" fill="${AXIS_COLORS[ax]}" font-family="'Noto Sans KR',sans-serif" font-weight="500">${ax}</text>`;}).join('');
  return`<svg width="200" height="200" viewBox="0 0 200 200">${grid}<path d="${toP(bg)}" fill="none" stroke="#D5CEC5" stroke-width="1"/><path d="${toP(pts)}" fill="${best.color}" fill-opacity="0.15" stroke="${best.color}" stroke-width="2"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${best.color}"/>`).join('')}${lbls}</svg>`;
}
function saveAsJpg(){const btn=event.target;btn.textContent='이미지 생성 중...';btn.disabled=true;const el=document.getElementById('screen-result');html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#F8F6F1',scrollY:-window.scrollY}).then(canvas=>{const link=document.createElement('a');link.download='신앙유형검사_결과.jpg';link.href=canvas.toDataURL('image/jpeg',0.92);link.click();btn.textContent='결과 이미지로 저장 (JPG)';btn.disabled=false;}).catch(()=>{btn.textContent='결과 이미지로 저장 (JPG)';btn.disabled=false;alert('저장 중 오류가 발생했습니다.');});}
function saveAsPdf(){
  const best=state.lastResult.ranked[0],norm=state.lastResult.norm,analysis=best.analyze(norm,state.answers),enc=best.encourage,aptRanked=state.lastResult.aptRanked;
  const win=window.open('','_blank','width=800,height=900');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>신앙유형검사 결과지</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#1A1814;padding:48px 56px;max-width:720px;margin:0 auto;}h1{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:600;color:${best.color};margin-bottom:6px;}.sub{font-size:14px;color:#7A7568;margin-bottom:4px;}.quote{font-size:13px;color:#B0A99E;font-style:italic;margin-bottom:32px;}.divider{height:1px;background:#E8E3DC;margin:24px 0;}.label{font-size:10px;font-weight:500;letter-spacing:.8px;color:#B0A99E;text-transform:uppercase;margin-bottom:12px;}.score-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.score-name{width:44px;font-size:13px;font-weight:500;}.bar-bg{flex:1;height:7px;background:#F0EDE8;border-radius:4px;overflow:hidden;}.bar-fill{height:7px;border-radius:4px;}.score-val{width:30px;text-align:right;font-size:13px;font-weight:500;}p{font-size:13.5px;line-height:1.85;color:#7A7568;margin-bottom:8px;}.verse{font-family:'Noto Serif KR',serif;font-size:15px;line-height:1.9;color:#1A1814;margin:24px 0 6px;text-align:center;white-space:pre-line;}.enc-ref{font-size:12px;color:#B0A99E;text-align:center;margin-bottom:12px;}.enc-msg{font-size:13px;color:#7A7568;line-height:1.85;text-align:center;}.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:500;background:${best.light};color:${best.color};margin-bottom:14px;}.apt-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F4F0EB;font-size:13px;}.apt-num{width:20px;color:#B0A99E;font-size:11px;}.apt-name{width:60px;font-weight:500;}.apt-desc{flex:1;font-size:12px;color:#7A7568;}.apt-score{width:20px;text-align:right;color:#1A1814;font-weight:500;}.questions-section{margin-top:40px;}.q-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:600;margin-bottom:16px;border-bottom:1px solid #E8E3DC;padding-bottom:8px;}.q-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #F4F0EB;font-size:12px;color:#7A7568;}.q-num{width:26px;flex-shrink:0;color:#B0A99E;}.q-text{flex:1;}.q-ans{width:30px;text-align:right;font-weight:500;color:#1A1814;}@media print{body{padding:28px 36px;}@page{margin:0;}}</style></head><body>
  <div class="badge">나의 신앙 유형</div><h1>${best.name}</h1><div class="sub">${best.sub}</div><div class="quote">${best.quote}</div><div class="divider"></div>
  <div class="label">영역별 점수</div>${AXIS_4.map(ax=>`<div class="score-row"><div class="score-name" style="color:${AXIS_COLORS[ax]}">${ax}</div><div class="bar-bg"><div class="bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div><div class="score-val">${norm[ax]}</div></div>`).join('')}
  <div class="divider"></div><div class="label">핵심 특성</div>${analysis.traits.map(t=>`<p>${t}</p>`).join('')}
  <div class="label" style="margin-top:16px">나아갈 방향</div>${analysis.growth.map(t=>`<p>${t}</p>`).join('')}
  <div class="label" style="margin-top:16px">나에게 건네는 말</div>${analysis.counsel.map(t=>`<p>${t}</p>`).join('')}
  <div class="divider"></div><div class="label">나의 성장 적성</div>${aptRanked.map(([name,score],i)=>`<div class="apt-row"><span class="apt-num">${i+1}</span><span class="apt-name">${name}</span><span class="apt-desc">${APT_TYPES[name]?.desc||''}</span><span class="apt-score">${score}</span></div>`).join('')}
  <div class="divider"></div><div class="verse">${enc.verse}</div><div class="enc-ref">${enc.ref}</div><div class="enc-msg">${enc.msg}</div>
  <div class="questions-section"><div class="q-title">나의 응답 기록 (74문항)</div>${QUESTIONS.map(q=>`<div class="q-row"><span class="q-num">${q.n}</span><span class="q-text">${q.t}</span><span class="q-ans">${state.answers[q.n]||'-'}</span></div>`).join('')}</div>
  <script>window.onload=()=>{setTimeout(()=>window.print(),400);}<\/script></body></html>`);win.document.close();
}
function retry(){startAssessment();}
</script>
</body>
</html>
