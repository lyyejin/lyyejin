<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>신앙 유형 검사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');

:root {
  --bg: #F8F6F1;
  --surface: #FFFFFF;
  --text: #1A1814;
  --text-muted: #7A7568;
  --text-light: #B0A99E;
  --border: #E8E3DC;
  --accent: #3D3526;
  --progress-h: 3px;

  --c-기반: #534AB7;
  --c-인성: #0F6E56;
  --c-신앙: #993C1D;
  --c-환경: #185FA5;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 16px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PROGRESS BAR ── */
.progress-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--progress-h); background: var(--border); z-index: 100;
}
.progress-fill {
  height: 100%; background: var(--accent);
  transition: width .4s ease; width: 0%;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── INTRO ── */
#screen-intro {
  justify-content: center; align-items: center;
  padding: 48px 28px; text-align: center;
}
.intro-ornament {
  width: 56px; height: 1px; background: var(--accent); margin: 0 auto 32px;
}
.intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 26px; font-weight: 600; letter-spacing: -.5px;
  line-height: 1.3; margin-bottom: 12px;
}
.intro-sub {
  font-size: 13px; color: var(--text-muted); line-height: 1.8;
  margin-bottom: 40px;
}
.intro-meta {
  display: flex; gap: 24px; justify-content: center;
  margin-bottom: 44px;
}
.meta-item { text-align: center; }
.meta-num { font-family: 'Noto Serif KR', serif; font-size: 24px; font-weight: 600; }
.meta-lbl { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.btn-start {
  display: block; width: 100%;
  padding: 16px; background: var(--accent);
  color: #fff; border: none; border-radius: 2px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 500; letter-spacing: .5px;
  cursor: pointer; transition: opacity .2s;
}
.btn-start:active { opacity: .85; }

/* ── AXIS INTRO ── */
#screen-axis {
  justify-content: center; align-items: center;
  padding: 48px 28px; text-align: center;
}
.axis-icon {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; font-size: 11px; font-weight: 500;
  color: #fff; letter-spacing: .5px;
}
.axis-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px; font-weight: 600; margin-bottom: 8px;
}
.axis-desc { font-size: 13px; color: var(--text-muted); line-height: 1.8; margin-bottom: 36px; }
.axis-range { font-size: 11px; color: var(--text-light); }

/* ── QUESTION ── */
#screen-question {
  padding-top: var(--progress-h);
}
.q-top {
  padding: 20px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.q-counter { font-size: 11px; color: var(--text-light); letter-spacing: .5px; }
.q-axis-tag {
  font-size: 10px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; letter-spacing: .3px;
}
.q-body {
  flex: 1; padding: 28px 24px 24px;
  display: flex; flex-direction: column;
}
.q-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px; font-weight: 400; line-height: 1.65;
  flex: 1; margin-bottom: 40px;
}
.q-rev-notice {
  font-size: 11px; color: var(--text-light);
  margin-bottom: 16px; padding: 8px 12px;
  border-left: 2px solid var(--border);
}
.likert {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.likert-btn {
  flex: 1; aspect-ratio: 1;
  border: 1.5px solid var(--border);
  background: var(--surface); border-radius: 4px;
  font-size: 15px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  transition: all .15s; display: flex;
  align-items: center; justify-content: center;
}
.likert-btn.selected {
  border-width: 2px; color: #fff;
}
.likert-btn:active { transform: scale(.95); }
.likert-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--text-light);
  padding: 0 2px; margin-bottom: 32px;
}
.q-nav {
  display: flex; gap: 10px;
}
.btn-prev {
  padding: 14px 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); border-radius: 2px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; cursor: pointer;
}
.btn-next {
  flex: 1; padding: 14px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 2px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: opacity .2s;
}
.btn-next:disabled { opacity: .35; cursor: default; }

/* ── CALCULATING ── */
#screen-calc {
  justify-content: center; align-items: center;
  padding: 48px 28px; text-align: center;
}
.calc-ring {
  width: 64px; height: 64px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 1s linear infinite; margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.calc-text { font-size: 14px; color: var(--text-muted); }

/* ── RESULT ── */
#screen-result { padding: 0; }
.result-header {
  padding: 48px 28px 32px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.result-badge {
  display: inline-block; font-size: 11px; font-weight: 500;
  padding: 4px 14px; border-radius: 20px; letter-spacing: .3px;
  margin-bottom: 16px;
}
.result-typename {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px; font-weight: 600; margin-bottom: 6px;
}
.result-typesub { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
.result-quote {
  font-size: 13px; color: var(--text-light);
  font-style: italic; margin-top: 16px; line-height: 1.6;
}

.result-section { padding: 28px 24px; border-bottom: 1px solid var(--border); }
.section-label {
  font-size: 10px; font-weight: 500; letter-spacing: .8px;
  color: var(--text-light); text-transform: uppercase; margin-bottom: 16px;
}

/* radar */
.radar-wrap { display: flex; justify-content: center; margin: 4px 0 12px; }

/* axis bars */
.axis-bar-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.axis-bar-label { font-size: 13px; font-weight: 500; width: 32px; flex-shrink: 0; }
.axis-bar-bg {
  flex: 1; height: 6px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.axis-bar-fill { height: 6px; border-radius: 3px; transition: width .6s ease; }
.axis-bar-val { font-size: 13px; font-weight: 500; width: 32px; text-align: right; flex-shrink: 0; }

/* text blocks */
.txt-block {
  background: var(--bg); border-radius: 4px;
  padding: 16px; margin-bottom: 10px;
}
.txt-block-label {
  font-size: 10px; font-weight: 500; letter-spacing: .5px;
  color: var(--text-light); margin-bottom: 8px;
}
.txt-block-body { font-size: 13px; line-height: 1.8; color: var(--text-muted); }

/* rank */
.rank-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.rank-item:last-child { border-bottom: none; }
.rank-num { font-size: 11px; color: var(--text-light); width: 16px; }
.rank-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rank-name { font-size: 14px; font-weight: 500; flex: 1; }
.rank-bar-bg { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.rank-bar-fill { height: 4px; border-radius: 2px; }
.rank-dist { font-size: 11px; color: var(--text-light); width: 40px; text-align: right; }

/* flags */
.flag-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: #FFF8F0;
  border-left: 3px solid #E8A44A; border-radius: 0 4px 4px 0;
  margin-bottom: 8px; font-size: 13px; color: #7A5820;
}

.btn-retry {
  display: block; width: calc(100% - 48px); margin: 28px 24px;
  padding: 16px; background: transparent;
  border: 1px solid var(--accent); color: var(--accent);
  border-radius: 2px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer;
  text-align: center;
}

/* ── RADAR SVG ── */
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="intro-ornament"></div>
  <h1 class="intro-title">나의 신앙 유형은<br>무엇인가요?</h1>
  <p class="intro-sub">80개의 질문을 통해<br>나의 신앙 여정을 깊이 이해합니다.</p>
  <div class="intro-meta">
    <div class="meta-item"><div class="meta-num">80</div><div class="meta-lbl">문항</div></div>
    <div class="meta-item"><div class="meta-num">4</div><div class="meta-lbl">영역</div></div>
    <div class="meta-item"><div class="meta-num">8</div><div class="meta-lbl">유형</div></div>
  </div>
  <button class="btn-start" onclick="startAssessment()">검사 시작하기</button>
</div>

<!-- AXIS INTRO -->
<div class="screen" id="screen-axis">
  <div class="axis-icon" id="axisIcon"></div>
  <div class="axis-title" id="axisTitle"></div>
  <div class="axis-desc" id="axisDesc"></div>
  <div class="axis-range" id="axisRange"></div>
  <button class="btn-start" style="margin: 36px 28px 0; width: calc(100% - 56px);" onclick="startAxis()">시작하기</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <div class="q-top">
    <span class="q-counter" id="qCounter"></span>
    <span class="q-axis-tag" id="qAxisTag"></span>
  </div>
  <div class="q-body">
    <div class="q-text" id="qText"></div>
    <div class="q-rev-notice" id="qRevNotice" style="display:none">이 문항은 역방향 문항입니다.</div>
    <div class="likert" id="likert"></div>
    <div class="likert-labels">
      <span>전혀 아니다</span><span>매우 그렇다</span>
    </div>
    <div class="q-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">이전</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>
</div>

<!-- CALCULATING -->
<div class="screen" id="screen-calc">
  <div class="calc-ring"></div>
  <div class="calc-text">유형을 분석하고 있습니다...</div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header" id="resultHeader"></div>
  <div id="resultBody"></div>
  <button class="btn-retry" onclick="retry()">다시 검사하기</button>
</div>

<script>
const AXES_INFO = [
  { id:'기반', color:'#534AB7', light:'#EEEDFE', dark:'#3C3489',
    title:'기본 정보 영역',
    desc:'신앙생활의 기반이 되는 환경, 관계, 경험, 습관을 살펴봅니다.',
    range:'Q1 — Q20' },
  { id:'인성', color:'#0F6E56', light:'#E1F5EE', dark:'#085041',
    title:'인성 영역',
    desc:'나의 성품, 관계 방식, 정서적 건강과 성장 의지를 살펴봅니다.',
    range:'Q21 — Q40' },
  { id:'신앙', color:'#993C1D', light:'#FAECE7', dark:'#712B13',
    title:'신앙 영역',
    desc:'영적 확신, 말씀과의 관계, 구원의 소망과 영적 성장을 살펴봅니다.',
    range:'Q41 — Q60' },
  { id:'환경', color:'#185FA5', light:'#E6F1FB', dark:'#0C447C',
    title:'환경 영역',
    desc:'현재 신앙생활을 둘러싼 외적 상황과 지지 체계를 살펴봅니다.',
    range:'Q61 — Q80' },
];

const QUESTIONS = [
  {a:'기반',n:1,t:'현재 살고 계신 곳에서 모임 장소까지 오가는 거리가 적당한가요?',r:false},
  {a:'기반',n:2,t:'평소 이용하시는 교통수단으로 이동하기에 편리한가요?',r:false},
  {a:'기반',n:3,t:'지금 하고 계신 일이나 수입이 생활을 유지하기에 안정적인가요?',r:false},
  {a:'기반',n:4,t:'경제적인 형편이 신앙 활동을 이어가는 데 적절한 바탕이 되고 있나요?',r:false},
  {a:'기반',n:5,t:'소중한 가족들이 나의 신앙 활동을 존중하고 응원해 주나요?',r:false},
  {a:'기반',n:6,t:'가족 중에 나의 신앙 고민을 함께 나누고 공감해 줄 분이 계신가요?',r:false},
  {a:'기반',n:7,t:'현재 가깝게 지내는 분이 나의 신앙에 좋은 영향을 주나요?',r:false},
  {a:'기반',n:8,t:'신앙을 시작한 기간만큼 나의 마음도 깊어지고 있다고 느끼시나요?',r:false},
  {a:'기반',n:9,t:'과거에 교회에서 활동했던 경험들이 지금의 나에게 큰 도움이 되나요?',r:false},
  {a:'기반',n:10,t:'내가 가진 재능이나 기술을 공동체를 위해 나누고 싶은 마음이 있나요?',r:false},
  {a:'기반',n:11,t:'평소 즐기는 취미 활동이 나의 일상에 건강한 활력을 불어넣어 주나요?',r:false},
  {a:'기반',n:12,t:'요즘 나의 주된 관심사들이 신앙과 연결되어 있나요?',r:false},
  {a:'기반',n:13,t:'새로운 사람들과 마음을 나누고 신뢰를 쌓는 일이 편안한가요?',r:false},
  {a:'기반',n:14,t:'내 속마음을 편히 털어놓을 친한 사람이 있나요?',r:false},
  {a:'기반',n:15,t:'누군가를 돕거나 이끄는 일에 보람을 느끼는 편인가요?',r:false},
  {a:'기반',n:16,t:'말씀을 체계적으로 배워본 경험이 신앙 토대를 튼튼하게 해주었나요?',r:false},
  {a:'기반',n:17,t:'이전에 배웠던 성경 공부 내용이 나의 삶에 실제적인 도움이 되었나요?',r:false},
  {a:'기반',n:18,t:'내가 신앙을 가지는 가장 큰 이유는 진리와 구원 때문인가요?',r:false},
  {a:'기반',n:19,t:'바쁜 일상 속에서도 예배나 모임 시간을 지키려 노력하시나요?',r:false},
  {a:'기반',n:20,t:'모임의 연락이나 메시지에 성실하고 빠르게 답해 주시는 편인가요?',r:false},
  {a:'인성',n:21,t:'처음 만나는 사람에게 먼저 다가가 인사를 나누는 편인가요?',r:false},
  {a:'인성',n:22,t:'주변 사람들은 나를 믿음직한 사람으로 보나요?',r:false},
  {a:'인성',n:23,t:'누군가와 다퉜을 때, 먼저 화해하려고 노력하나요?',r:false},
  {a:'인성',n:24,t:'주변 사람들의 말에 휘둘리지 않고 내 소신껏 결정하는 편인가요?',r:false},
  {a:'인성',n:25,t:'나의 가족 관계는 서로를 지지해 주며 정서적으로 화목한 편인가요?',r:false},
  {a:'인성',n:26,t:'다른 사람과의 약속 시간을 철저히 지키려고 노력하시나요?',r:false},
  {a:'인성',n:27,t:'누군가를 대할 때 늘 존중하는 마음과 부드러운 태도를 유지하시나요?',r:false},
  {a:'인성',n:28,t:'어린 시절의 기억들이 나를 긍정적으로 형성하는 데 도움이 되었나요?',r:false},
  {a:'인성',n:29,t:'과거의 아픈 기억들로부터 조금씩 자유로워져 현재를 살고 계신가요?',r:false},
  {a:'인성',n:30,t:'당장의 즐거움보다 더 가치 있고 의미 있는 일을 찾으려 노력하나요?',r:false},
  {a:'인성',n:31,t:'나의 부족한 점을 발견했을 때, 더 나은 모습으로 변화하고 싶으신가요?',r:false},
  {a:'인성',n:32,t:'힘든 일이 생겼을 때, 누군가에게 도움을 요청하시나요?',r:false},
  {a:'인성',n:33,t:'평소 마음이 평안하며, 우울하거나 무기력한 기분을 잘 이겨내나요?',r:false},
  {a:'인성',n:34,t:'내가 꿈꾸는 미래와 현재의 삶이 조화롭게 연결되어 있나요?',r:false},
  {a:'인성',n:35,t:'한 번 시작한 일은 끝까지 책임지고 마무리하는 편인가요?',r:false},
  {a:'인성',n:36,t:'나를 아끼는 사람들의 조언이나 충고가 사랑으로 느껴지시나요?',r:false},
  {a:'인성',n:37,t:'기분이 좋거나 나쁠 때도 한결같이 일상의 중심을 잘 잡으시나요?',r:false},
  {a:'인성',n:38,t:'이성 관계나 사랑하는 감정이 일상에 긍정적인 에너지가 되나요?',r:false},
  {a:'인성',n:39,t:'지나간 일에 대한 후회보다는 다가올 미래를 기대하며 사시나요?',r:false},
  {a:'인성',n:40,t:'혼자 있는 시간에도 스스로의 양심에 비추어 정직하게 행동하시나요?',r:false},
  {a:'신앙',n:41,t:'보이지 않는 영적인 세계가 실재한다는 느낌을 일상에서 받으시나요?',r:false},

const WEIGHTS = {신앙:1.6, 인성:1.2, 환경:1.0, 기반:0.8};
const AXIS_ORDER = ['신앙','인성','환경','기반'];
const AXIS_COLORS = {기반:'#534AB7',인성:'#0F6E56',신앙:'#993C1D',환경:'#185FA5'};

let state = { qIdx:0, answers:{}, axisPhase:null };

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function updateProgress() {
  const pct = Math.round((state.qIdx / QUESTIONS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function startAssessment() {
  state.qIdx = 0;
  state.answers = {};
  state.axisPhase = '기반';
  showAxisIntro('기반');
}

function showAxisIntro(axisId) {
  const info = AXES_INFO.find(a => a.id === axisId);
  document.getElementById('axisIcon').style.background = info.color;
  document.getElementById('axisIcon').textContent = axisId;
  document.getElementById('axisTitle').textContent = info.title;
  document.getElementById('axisDesc').textContent = info.desc;
  document.getElementById('axisRange').textContent = info.range;
  show('axis');
}

function startAxis() { renderQuestion(); }

function renderQuestion() {
  if (state.qIdx >= QUESTIONS.length) { runClassify(); return; }
  const q = QUESTIONS[state.qIdx];
  const axInfo = AXES_INFO.find(a => a.id === q.a);

  document.getElementById('qCounter').textContent = `${state.qIdx + 1} / ${QUESTIONS.length}`;
  const tag = document.getElementById('qAxisTag');
  tag.textContent = q.a + ' 영역';
  tag.style.background = axInfo.light;
  tag.style.color = axInfo.dark;

  document.getElementById('qText').textContent = q.t;
  const revNotice = document.getElementById('qRevNotice');
  revNotice.style.display = q.r ? 'block' : 'none';

  const likert = document.getElementById('likert');
  likert.innerHTML = '';
  const cur = state.answers[q.n];
  [1,2,3,4,5].forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'likert-btn' + (cur === v ? ' selected' : '');
    btn.textContent = v;
    if (cur === v) {
      btn.style.background = axInfo.color;
      btn.style.borderColor = axInfo.color;
    }
    btn.onclick = () => {
      state.answers[q.n] = v;
      document.querySelectorAll('.likert-btn').forEach(b => {
        b.classList.remove('selected');
        b.style.background = '';
        b.style.borderColor = '';
        b.style.color = '';
      });
      btn.classList.add('selected');
      btn.style.background = axInfo.color;
      btn.style.borderColor = axInfo.color;
      document.getElementById('btnNext').disabled = false;
    };
    likert.appendChild(btn);
  });

  document.getElementById('btnNext').disabled = !cur;
  document.getElementById('btnPrev').style.display = state.qIdx === 0 ? 'none' : 'block';
  updateProgress();
  show('question');
}

function nextQ() {
  state.qIdx++;
  if (state.qIdx < QUESTIONS.length) {
    const q = QUESTIONS[state.qIdx];
    if (q.a !== QUESTIONS[state.qIdx-1].a) {
      showAxisIntro(q.a);
    } else {
      renderQuestion();
    }
  } else {
    runClassify();
  }
}

function prevQ() {
  if (state.qIdx > 0) { state.qIdx--; renderQuestion(); }
}

function runClassify() {
  show('calc');
  updateProgress();
  document.getElementById('progressFill').style.width = '100%';
  setTimeout(doClassify, 1200);
}

function doClassify() {
  const raw = {신앙:0,인성:0,환경:0,기반:0};
  QUESTIONS.forEach(q => {
    const v = state.answers[q.n] || 3;
    raw[q.a] += q.r ? 6-v : v;
  });
  const norm = {};
  AXIS_ORDER.forEach(ax => { norm[ax] = Math.round(raw[ax] / 100 * 100); });

  let ranked = TYPES.map(t => ({
    ...t,
    d: Math.sqrt(AXIS_ORDER.reduce((s,ax) => s + WEIGHTS[ax]*Math.pow(norm[ax]-t.p[ax],2), 0))
  })).sort((a,b) => a.d - b.d);

  // anchor rules
  if (norm['신앙'] <= 40) {
    const c = ranked.filter(t => t.name==='탐색형'||t.name==='준비형');
    if (c.length && c[0].d < ranked[0].d * 1.3) ranked = [c[0], ...ranked.filter(t=>t.name!==c[0].name)];
  }
  if (norm['환경'] <= 35) {
    const c = ranked.filter(t => t.name==='광야형'||t.name==='인내형');
    if (c.length && c[0].d < ranked[0].d * 1.3) ranked = [c[0], ...ranked.filter(t=>t.name!==c[0].name)];
  }
  if (AXIS_ORDER.every(ax => norm[ax] >= 78)) {
    const rf = ranked.find(t=>t.name==='결실형');
    if (rf) ranked = [rf, ...ranked.filter(t=>t.name!=='결실형')];
  }

  const flags = AXIS_ORDER.filter(ax => norm[ax] <= 35).map(ax => ax + ' 축 취약 — 상담자 확인 필요');
  renderResult(ranked, norm, flags);
}

function renderResult(ranked, norm, flags) {
  const best = ranked[0];

  // header
  document.getElementById('resultHeader').innerHTML = `
    <div class="result-badge" style="background:${best.light};color:${best.color}">나의 신앙 유형</div>
    <div class="result-typename" style="color:${best.color}">${best.name}</div>
    <div class="result-typesub">${best.sub}</div>
    <div class="result-quote">${best.quote}</div>`;

  let body = '';

  // flags
  if (flags.length) {
    body += `<div class="result-section">
      <div class="section-label">주의 사항</div>
      ${flags.map(f=>`<div class="flag-item">${f}</div>`).join('')}
    </div>`;
  }

  // radar + bars
  body += `<div class="result-section">
    <div class="section-label">영역별 점수</div>
    <div class="radar-wrap">${buildRadar(norm, best)}</div>
    ${AXIS_ORDER.map(ax=>`
      <div class="axis-bar-row">
        <span class="axis-bar-label" style="color:${AXIS_COLORS[ax]}">${ax}</span>
        <div class="axis-bar-bg"><div class="axis-bar-fill" style="width:${norm[ax]}%;background:${AXIS_COLORS[ax]}"></div></div>
        <span class="axis-bar-val">${norm[ax]}</span>
      </div>`).join('')}
  </div>`;

  // type info
  body += `<div class="result-section">
    <div class="section-label">유형 분석</div>
    <div class="txt-block">
      <div class="txt-block-label">핵심 특성</div>
      <div class="txt-block-body">${best.traits}</div>
    </div>
    <div class="txt-block">
      <div class="txt-block-label">성장 과제</div>
      <div class="txt-block-body">${best.growth}</div>
    </div>
    <div class="txt-block">
      <div class="txt-block-label">상담 방향</div>
      <div class="txt-block-body">${best.counsel}</div>
    </div>
  </div>`;

  // rank
  const maxD = Math.max(...ranked.map(r=>r.d));
  body += `<div class="result-section">
    <div class="section-label">전체 유형 유사도</div>
    ${ranked.map((t,i)=>`
      <div class="rank-item">
        <span class="rank-num">${i+1}</span>
        <span class="rank-dot" style="background:${t.color}"></span>
        <span class="rank-name">${t.name}</span>
        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.round((1-t.d/maxD)*100)}%;background:${t.color}"></div></div>
        <span class="rank-dist">${Math.round(t.d)}</span>
      </div>`).join('')}
  </div>`;

  document.getElementById('resultBody').innerHTML = body;
  show('result');
}

function buildRadar(norm, best) {
  const cx=100, cy=100, r=70, N=4;
  const labels = AXIS_ORDER;
  const pts = labels.map((ax,i) => {
    const a = Math.PI*2*i/N - Math.PI/2;
    const v = norm[ax]/100;
    return [cx+r*v*Math.cos(a), cy+r*v*Math.sin(a)];
  });
  const bg = labels.map((ax,i) => {
    const a = Math.PI*2*i/N - Math.PI/2;
    return [cx+r*Math.cos(a), cy+r*Math.sin(a)];
  });
  const toPath = arr => arr.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+'Z';
  const lbls = labels.map((ax,i) => {
    const a = Math.PI*2*i/N - Math.PI/2;
    const lx = cx+(r+18)*Math.cos(a);
    const ly = cy+(r+18)*Math.sin(a);
    const anch = Math.abs(Math.cos(a))<0.1?'middle':Math.cos(a)>0?'start':'end';
    return `<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="${anch}" font-size="11" fill="${AXIS_COLORS[ax]}" font-family="'Noto Sans KR',sans-serif" font-weight="500">${ax}</text>`;
  }).join('');
  const grid = [0.25,0.5,0.75,1].map(s => {
    const gpts = labels.map((_,i)=>{const a=Math.PI*2*i/N-Math.PI/2;return[cx+r*s*Math.cos(a),cy+r*s*Math.sin(a)];});
    return `<path d="${toPath(gpts)}" fill="none" stroke="#E8E3DC" stroke-width="1"/>`;
  }).join('');
  return `<svg width="200" height="200" viewBox="0 0 200 200">
    ${grid}
    <path d="${toPath(bg)}" fill="none" stroke="#D5CEC5" stroke-width="1"/>
    <path d="${toPath(pts)}" fill="${best.color}" fill-opacity="0.15" stroke="${best.color}" stroke-width="2"/>
    ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${best.color}"/>`).join('')}
    ${lbls}
  </svg>`;
}

function retry() { startAssessment(); }
</script>
